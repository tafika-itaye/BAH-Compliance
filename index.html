<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="refresh" content="3;url=app.html">
<title>BAH Compliance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#1A3636;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  color:#fff;
  transition:opacity .4s ease;
}
body.fade-out{opacity:0}

/* Logo container */
.logo-wrap{
  width:120px;height:120px;
  animation:logoIn .8s cubic-bezier(.16,1,.3,1) both;
}
@keyframes logoIn{
  from{opacity:0;transform:scale(.7) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* App name */
.app-name{
  margin-top:24px;
  font-size:22px;font-weight:700;letter-spacing:.5px;
  animation:textIn .6s .3s cubic-bezier(.16,1,.3,1) both;
}
.app-subtitle{
  margin-top:6px;
  font-size:13px;font-weight:400;letter-spacing:.8px;
  text-transform:uppercase;
  opacity:.55;
  animation:textIn .6s .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes textIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* Loading dots */
.dots{
  display:flex;gap:8px;
  margin-top:48px;
  animation:textIn .4s .7s cubic-bezier(.16,1,.3,1) both;
}
.dots span{
  width:8px;height:8px;border-radius:50%;
  background:#4DB6AC;
  animation:bounce 1.4s infinite ease-in-out both;
}
.dots span:nth-child(1){animation-delay:0s}
.dots span:nth-child(2){animation-delay:.16s}
.dots span:nth-child(3){animation-delay:.32s}
@keyframes bounce{
  0%,80%,100%{transform:scale(0);opacity:.4}
  40%{transform:scale(1);opacity:1}
}

/* Powered-by */
.powered{
  position:fixed;bottom:28px;
  font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
  opacity:.25;
  animation:textIn .4s .9s cubic-bezier(.16,1,.3,1) both;
}
</style>
</head>
<body>

<!-- Embedded SVG: Shield + checkmark + small cross = Compliance -->
<div class="logo-wrap">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect x="10" y="10" width="100" height="100" rx="22" fill="#00695C"/>
  <!-- Shield shape -->
  <path d="M60 28 L85 40 C85 68 75 88 60 96 C45 88 35 68 35 40 Z"
        fill="none" stroke="#80CBC4" stroke-width="2.5" opacity=".4"/>
  <path d="M60 32 L81 42 C81 66 72 84 60 91 C48 84 39 66 39 42 Z"
        fill="#00897B" opacity=".5"/>
  <!-- Checkmark -->
  <polyline points="48,60 56,70 74,48"
    fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small hospital cross top-right -->
  <g transform="translate(82,30) scale(.4)" fill="#B2DFDB" opacity=".7">
    <rect x="-4" y="-12" width="8" height="24" rx="2"/>
    <rect x="-12" y="-4" width="24" height="8" rx="2"/>
  </g>
  <!-- Small clipboard icon bottom-right -->
  <g transform="translate(84,86) scale(.5)">
    <rect x="0" y="2" width="18" height="22" rx="3" fill="#B2DFDB" opacity=".6"/>
    <rect x="5" y="0" width="8" height="5" rx="2" fill="#80CBC4" opacity=".7"/>
    <line x1="4" y1="11" x2="14" y2="11" stroke="#00695C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="15" x2="12" y2="15" stroke="#00695C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="19" x2="10" y2="19" stroke="#00695C" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
</div>

<div class="app-name">BAH Compliance</div>
<div class="app-subtitle">Blantyre Adventist Hospital</div>

<div class="dots">
  <span></span><span></span><span></span>
</div>

<div class="powered">TechNexus MW</div>

<script>
// Primary redirect — fires after 2.5s
var timer = setTimeout(function(){
  document.body.classList.add('fade-out');
  setTimeout(function(){ window.location.replace('app.html'); }, 400);
}, 2500);

// Tap to skip
document.body.addEventListener('click', function(){
  clearTimeout(timer);
  document.body.classList.add('fade-out');
  setTimeout(function(){ window.location.replace('app.html'); }, 200);
});

// Fallback: if page is still visible after 5s, force redirect
setTimeout(function(){
  if(!document.hidden) window.location.replace('app.html');
}, 5000);
</script>
</body>
</html>
