<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>BAH Compliance</title>
<meta name="theme-color" content="#1A3636">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A3636;display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
.splash{display:flex;flex-direction:column;align-items:center;animation:fadeIn .8s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.logo-wrap{width:120px;height:120px;background:linear-gradient(135deg,#00695C,#00897B);border-radius:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(0,105,92,.4);margin-bottom:28px;position:relative}
.logo-wrap::after{content:'';position:absolute;inset:-3px;border-radius:30px;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);pointer-events:none}
.logo-wrap svg{width:64px;height:64px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.app-name{font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:-.02em;margin-bottom:4px}
.app-sub{font-size:.78rem;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;margin-bottom:36px}
.loader{display:flex;gap:6px}
.loader span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);animation:bounce 1.2s infinite}
.loader span:nth-child(2){animation-delay:.15s}.loader span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);background:rgba(255,255,255,.25)}40%{transform:translateY(-10px);background:#80CBC4}}
.footer{position:fixed;bottom:24px;left:0;right:0;text-align:center}
.footer span{font-size:.6rem;color:rgba(255,255,255,.2);letter-spacing:.06em}
</style>
</head><body>
<div class="splash">
  <div class="logo-wrap">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Shield -->
      <path d="M32 4L8 16v16c0 14.4 10.24 27.84 24 32 13.76-4.16 24-17.6 24-32V16L32 4z" fill="#fff" opacity=".9"/>
      <path d="M32 8L12 18v14c0 12.4 8.64 24 20 28 11.36-4 20-15.6 20-28V18L32 8z" fill="#00695C"/>
      <!-- Checkmark -->
      <path d="M22 32l8 8 14-16" stroke="#80CBC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Small cross (hospital) -->
      <rect x="28" y="12" width="8" height="14" rx="1.5" fill="#80CBC4" opacity=".5"/>
      <rect x="24" y="16" width="16" height="6" rx="1.5" fill="#80CBC4" opacity=".5"/>
    </svg>
  </div>
  <div class="app-name">BAH Compliance</div>
  <div class="app-sub">Blantyre Adventist Hospital</div>
  <div class="loader"><span></span><span></span><span></span></div>
</div>
<div class="footer"><span>TechNexus Malawi</span></div>
<script>setTimeout(()=>{window.location.href='index.html';},2500);</script>
</body></html>
