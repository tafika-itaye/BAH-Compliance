<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SOP Library — BAH Compliance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.dept-tab{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--win-border2);color:var(--text-muted);background:var(--win-surface);transition:all .12s;white-space:nowrap;}
.dept-tab:hover{border-color:var(--accent);color:var(--accent);}
.dept-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.sop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.sop-card{background:var(--win-surface);border:1px solid var(--win-border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .12s;}
.sop-card:hover{border-color:var(--accent);}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent = WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><a href="dashboard.html">Home</a><span>›</span><span>SOPs</span></div>
        <div class="page-title">SOP Library</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="dateLabel"></span>
        <button class="btn btn-primary btn-sm" onclick="showToast('Add SOP workflow opens version control')">＋ Add SOP</button>
      </div>
    </div>
    <div class="content">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">All Standard Operating Procedures — always showing latest approved version</div>
      <div class="filter-row">
        <div class="win-search"><span style="color:var(--text-muted)">🔍</span><input type="text" id="search" placeholder="Search SOPs…" oninput="render()"></div>
      </div>
      <div class="filter-row" id="deptTabs"></div>
      <div class="sop-grid" id="sopGrid"></div>
    </div>
  </div>
</div>
<script>
initData();
var user = requireLogin();
var deptFilter = '';
if (user) {
  renderSidebar('sops');
  document.getElementById('dateLabel').textContent = topbarDate();

  var depts = ['All Departments','Inpatient','Pharmacy','Laboratory','Emergency','Dental','Theatre','All'];
  var deptLabels = ['All Departments','🛏 Inpatient','💊 Pharmacy','🔬 Laboratory','🚨 Emergency','🦷 Dental','⚙ Theatre'];
  var deptKeys   = ['','Inpatient','Pharmacy','Laboratory','Emergency','Dental','Theatre'];
  var tabsHtml = '';
  deptLabels.forEach(function(l, i) {
    tabsHtml += '<div class="dept-tab' + (i===0?' active':'') + '" onclick="filterDept(\'' + deptKeys[i] + '\',this)">' + l + '</div>';
  });
  document.getElementById('deptTabs').innerHTML = tabsHtml;

  function render() {
    var q = document.getElementById('search').value.toLowerCase();
    var sops = getSOPs();
    if (deptFilter) sops = sops.filter(function(s){ return s.category === deptFilter || s.category === 'All'; });
    if (q) sops = sops.filter(function(s){ return s.title.toLowerCase().indexOf(q) !== -1 || s.dept.toLowerCase().indexOf(q) !== -1; });
    if (!sops.length) { document.getElementById('sopGrid').innerHTML = '<div class="empty-state"><div class="empty-icon">📘</div>No SOPs match your filters.</div>'; return; }
    document.getElementById('sopGrid').innerHTML = sops.map(function(s){
      return '<div class="sop-card" onclick="showToast(\'SOP viewer — would open document viewer\')">'
        + '<div style="font-size:22px;margin-bottom:7px">'+s.icon+'</div>'
        + '<div style="font-size:13px;font-weight:600;margin-bottom:3px">'+s.title+'</div>'
        + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">'+s.dept+'</div>'
        + '<div style="display:flex;align-items:center;justify-content:space-between">'+statusBadge(s.status)+'<span style="font-size:11px;color:var(--text-muted)">'+s.version+' · '+timeAgo(s.updated)+'</span></div>'
        + '</div>';
    }).join('');
  }

  function filterDept(d, el) {
    deptFilter = d;
    document.querySelectorAll('.dept-tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    render();
  }
  window.filterDept = filterDept;
  render();
}
</script>
</body>
</html>
