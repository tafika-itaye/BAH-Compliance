<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Policy Management — BAH Compliance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.pol-tabs{display:flex;gap:0;border-bottom:1px solid var(--win-border);margin-bottom:14px;}
.pol-tab{padding:8px 14px;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;}
.pol-tab:hover{color:var(--text);}
.pol-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.appr-strip{background:#fff4ce;border:1px solid #f7dba0;border-radius:6px;padding:12px 14px;margin-bottom:14px;}
.wf-wrap{display:flex;align-items:center;gap:0;margin-bottom:10px;overflow-x:auto;}
.wf-step{display:flex;align-items:center;gap:6px;font-size:12px;flex-shrink:0;}
.wf-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid #ccc;background:#fff;color:#999;flex-shrink:0;}
.wf-step.done .wf-circle{background:#0067c0;border-color:#0067c0;color:#fff;}
.wf-step.active .wf-circle{border-color:#0067c0;color:#0067c0;}
.wf-line{width:24px;height:1px;background:#ddd;flex-shrink:0;}
.wf-line.done{background:#0067c0;}
.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent = WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><a href="dashboard.html">Home</a><span>›</span><span>Policies</span></div>
        <div class="page-title">Policy Management</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="dateLabel"></span>
        <button class="btn btn-primary btn-sm" onclick="openNew()">＋ New Policy</button>
      </div>
    </div>
    <div class="content">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">Centralised policy repository with version control, approval workflows, and staff attestation</div>

      <div class="appr-strip" id="apprStrip" style="display:none">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">Policy Pending Approval</div>
        <div class="wf-wrap" id="wfBar"></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="approvePolicy()">Approve &amp; Publish</button>
          <button class="btn btn-secondary btn-sm" onclick="showToast('Revision requested — returned to Quality Officer','warning')">Request Revision</button>
        </div>
      </div>

      <div class="pol-tabs">
        <div class="pol-tab active" onclick="filterTab('',this)">All (<span id="cAll">0</span>)</div>
        <div class="pol-tab" onclick="filterTab('Active',this)">Active (<span id="cPub">0</span>)</div>
        <div class="pol-tab" onclick="filterTab('UnderReview',this)">Under Review (<span id="cRev">0</span>)</div>
        <div class="pol-tab" onclick="filterTab('Draft',this)">Draft (<span id="cDraft">0</span>)</div>
      </div>

      <div class="filter-row">
        <div class="win-search"><span style="color:var(--text-muted)">🔍</span><input type="text" id="search" placeholder="Search policies…" oninput="render()"></div>
        <select class="filter-select" id="catFilter" onchange="render()">
          <option value="">All Types</option>
          <option value="Policy">Policy</option>
          <option value="SOP">SOP</option>
          <option value="Guideline">Guideline</option>
        </select>
      </div>

      <div class="win-table-wrap">
        <table class="win-table">
          <thead><tr><th>Policy</th><th>Type</th><th>Version</th><th>Department</th><th>Attestation</th><th>Review Due</th><th>Status</th><th></th></tr></thead>
          <tbody id="polBody"><tr><td colspan="8"><div class="loading">Loading...</div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="newModal" style="display:none">
  <div class="win-modal">
    <div class="win-modal-header"><div class="win-modal-title">New Policy</div><button class="win-modal-close" onclick="closeNew()">✕</button></div>
    <div class="win-modal-body">
      <div class="form-group"><label class="form-label">Title</label><input type="text" class="form-control" id="nTitle" placeholder="Policy name"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Type</label><select class="form-control" id="nType"><option value="Policy">Policy</option><option value="SOP">SOP</option><option value="Guideline">Guideline</option></select></div>
        <div class="form-group"><label class="form-label">Department</label><input type="text" class="form-control" id="nDept" placeholder="e.g. Clinical"></div>
      </div>
      <div class="form-group"><label class="form-label">Content</label><textarea class="form-control" id="nContent" rows="4" placeholder="Enter policy content…"></textarea></div>
    </div>
    <div class="win-modal-footer">
      <button class="btn btn-secondary" onclick="closeNew()">Cancel</button>
      <button class="btn btn-primary" onclick="createPolicy()">Create Policy</button>
    </div>
  </div>
</div>

<script>
var tabFilter = '';
var pendingPolicyId = null;

initPage('policies').then(function(user) {
  renderSidebar('policies');
  document.getElementById('dateLabel').textContent = topbarDate();

  var pols = getPolicies();
  var pending = pols.find(function(p){ return p.status === 'UnderReview'; });
  if (pending && (user.role === 'quality' || user.role === 'admin')) {
    pendingPolicyId = pending.id;
    document.getElementById('apprStrip').style.display = 'block';
    document.getElementById('apprStrip').querySelector('div').textContent = pending.title + ' — Approval In Progress';
    var steps = [
      { label:'Drafted',   sub:'Q. Officer', done:true  },
      { label:'Reviewed',  sub:'Dept Head',  done:true  },
      { label:'Approved',  sub:'CEO',        done:false, active:true },
      { label:'Published', sub:'All Staff',  done:false },
      { label:'Attested',  sub:'Complete',   done:false },
    ];
    var wfHtml = '';
    steps.forEach(function(s, i) {
      if (i > 0) wfHtml += '<div class="wf-line'+(steps[i-1].done?' done':'')+'"></div>';
      wfHtml += '<div class="wf-step'+(s.done?' done':'')+(s.active?' active':'')+'">'
        + '<div class="wf-circle">'+(s.done?'✔':(i+1))+'</div>'
        + '<div><div style="color:'+(s.done?'#0067c0':s.active?'#1a1a1a':'#999')+';font-size:11px;font-weight:600">'+s.label+'</div>'
        + '<div style="color:#999;font-size:10px">'+s.sub+'</div></div>'
        + '</div>';
    });
    document.getElementById('wfBar').innerHTML = wfHtml;
  }

  render();
}).catch(function() {
  window.location.href = 'index.html';
});

function render() {
  var q   = document.getElementById('search').value.toLowerCase();
  var cf  = document.getElementById('catFilter').value;
  var all = getPolicies();

  document.getElementById('cAll').textContent   = all.length;
  document.getElementById('cPub').textContent   = all.filter(function(p){ return p.status === 'Active'; }).length;
  document.getElementById('cRev').textContent   = all.filter(function(p){ return p.status === 'UnderReview'; }).length;
  document.getElementById('cDraft').textContent = all.filter(function(p){ return p.status === 'Draft'; }).length;

  var list = all;
  if (tabFilter) list = list.filter(function(p){ return p.status === tabFilter; });
  if (q)         list = list.filter(function(p){ return (p.title||'').toLowerCase().indexOf(q) !== -1 || (p.department||'').toLowerCase().indexOf(q) !== -1; });
  if (cf)        list = list.filter(function(p){ return p.type === cf; });

  if (!list.length) {
    document.getElementById('polBody').innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📋</div>No policies match your filters.</div></td></tr>';
    return;
  }

  var html = '';
  list.forEach(function(p) {
    var attCount  = p.attestCount || 0;
    var attTarget = p.attestTarget || 0;
    var pct  = attTarget > 0 ? Math.round(attCount / attTarget * 100) : 0;
    var pcol = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
    var attCell = attTarget > 0
      ? '<div style="font-size:12px;margin-bottom:3px">'+attCount+'/'+attTarget+'</div><div style="width:70px">'+progressBar(pct, pcol)+'</div>'
      : '<span style="font-size:12px;color:var(--text-muted)">N/A</span>';
    var reviewDue = p.reviewDueDate ? new Date(p.reviewDueDate).toLocaleDateString('en-GB',{month:'short',year:'numeric'}) : '—';
    html += '<tr onclick="location.href=\'policy-detail.html?id='+p.id+'\'" style="cursor:pointer">'
      + '<td><span style="font-weight:600;color:var(--accent)">'+p.policyNumber+'</span><br><span style="font-size:12px">'+p.title+'</span></td>'
      + '<td style="font-size:12px">'+p.type+'</td>'
      + '<td style="font-size:12px;font-weight:600">v'+(p.version||'1.0')+'</td>'
      + '<td style="font-size:12px">'+(p.department||'—')+'</td>'
      + '<td>'+attCell+'</td>'
      + '<td style="font-size:12px;color:var(--text-muted)">'+reviewDue+'</td>'
      + '<td>'+statusBadge(p.status)+'</td>'
      + '<td><a href="policy-detail.html?id='+p.id+'" class="btn btn-secondary btn-sm" onclick="event.stopPropagation()">View</a></td>'
      + '</tr>';
  });
  document.getElementById('polBody').innerHTML = html;
}

function filterTab(st, el) {
  tabFilter = st;
  document.querySelectorAll('.pol-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  render();
}

function approvePolicy() {
  if (!pendingPolicyId) return;
  updateIncidentStatus(pendingPolicyId, 'Active', 'Policy approved and published.')
    .then(function() {
      document.getElementById('apprStrip').style.display = 'none';
      showToast('Policy approved and published to all staff');
      render();
    }).catch(function(e) {
      showToast('Error: ' + e, 'error');
    });
}

function openNew()  { document.getElementById('newModal').style.display = 'flex'; }
function closeNew() { document.getElementById('newModal').style.display = 'none'; }

function createPolicy() {
  var title = document.getElementById('nTitle').value.trim();
  if (!title) { showToast('Title is required.', 'error'); return; }
  showToast('Policy creation via API coming in next release. Contact your system administrator.', 'warning');
  closeNew();
}

window.filterTab     = filterTab;
window.approvePolicy = approvePolicy;
window.openNew       = openNew;
window.closeNew      = closeNew;
window.createPolicy  = createPolicy;
window.render        = render;
</script>
</body>
</html>
