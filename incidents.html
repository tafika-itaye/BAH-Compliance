<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>All Incidents — BAH Compliance</title>
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.inc-tabs{display:flex;gap:0;border-bottom:1px solid var(--win-border);margin-bottom:14px;}
.inc-tab{padding:8px 14px;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;}
.inc-tab:hover{color:var(--text);}
.inc-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent=WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><a href="dashboard.html">Home</a><span>›</span><span>Incidents</span></div>
        <div class="page-title">All Incidents &amp; Near Misses</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="dateLabel"></span>
        <button class="btn btn-primary btn-sm" onclick="location.href='report-incident.html'">⚠ Report Incident</button>
      </div>
    </div>
    <div class="content">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Complete incident register with investigation status tracking</div>
      <div class="stats-grid" id="incStats"></div>

      <div class="inc-tabs">
        <div class="inc-tab active" onclick="filterTab('',this)">All (<span id="cntAll">—</span>)</div>
        <div class="inc-tab" onclick="filterTab('No Harm',this)">No Harm (<span id="cntNH">—</span>)</div>
        <div class="inc-tab" onclick="filterTab('Near Miss',this)">Near Miss (<span id="cntNM">—</span>)</div>
        <div class="inc-tab" onclick="filterTab('Adverse Event',this)">Adverse (<span id="cntAE">—</span>)</div>
      </div>

      <div class="filter-row">
        <div class="win-search"><span style="color:var(--text-muted)">🔍</span><input type="text" id="search" placeholder="Search incidents…" oninput="render()"></div>
        <select class="filter-select" id="statusFilter" onchange="render()"><option value="">All Status</option><option>Investigating</option><option>Action Plan</option><option>Closed</option></select>
        <select class="filter-select" id="deptFilter" onchange="render()"><option value="">All Depts</option><option>OPD</option><option>Ward 2</option><option>Ward 3</option><option>Laboratory</option><option>Emergency</option><option>Pharmacy</option><option>Theatre</option></select>
      </div>

      <div class="win-table-wrap">
        <table class="win-table">
          <thead><tr><th>Ref</th><th>Description</th><th>Type</th><th>Severity</th><th>Dept</th><th>Reported</th><th>Status</th><th></th></tr></thead>
          <tbody id="incBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
initData();
const user=requireLogin();
let tabSev='';
if(user){
  renderSidebar('incidents');
  document.getElementById('dateLabel').textContent=topbarDate();
  function render(){
    const q=document.getElementById('search').value.toLowerCase();
    const sf=document.getElementById('statusFilter').value;
    const df=document.getElementById('deptFilter').value;
    let inc=getIncidents();
    document.getElementById('cntAll').textContent=inc.length;
    document.getElementById('cntNH').textContent=inc.filter(i=>i.severity==='No Harm').length;
    document.getElementById('cntNM').textContent=inc.filter(i=>i.severity==='Near Miss').length;
    document.getElementById('cntAE').textContent=inc.filter(i=>i.severity==='Adverse Event').length;

    const open=inc.filter(i=>i.status==='Investigating'||i.status==='Action Plan').length;
    const closed=inc.filter(i=>i.status==='Closed').length;
    const nmRate=Math.round(inc.filter(i=>i.severity==='Near Miss').length/inc.length*100)||0;
    document.getElementById('incStats').innerHTML=[
      {icon:'⚠', label:'Total This Month', value:inc.length, sub:'▲ +22% reporting rate', cls:''},
      {icon:'🔍',label:'Under Investigation',value:open,sub:'Awaiting completion',cls:open>0?'stat-warn':'stat-ok'},
      {icon:'✔', label:'Closed',            value:closed,sub:'Actions complete',      cls:'stat-ok'},
      {icon:'📊',label:'Near Miss Rate',     value:nmRate+'%',sub:'Target: ≥ 30%',    cls:nmRate>=30?'stat-ok':'stat-warn'},
    ].map(s=>`<div class="stat-card"><div style="font-size:20px;margin-bottom:4px">${s.icon}</div><div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`).join('');

    if(tabSev) inc=inc.filter(i=>i.severity===tabSev);
    if(sf) inc=inc.filter(i=>i.status===sf);
    if(df) inc=inc.filter(i=>i.dept===df);
    if(q) inc=inc.filter(i=>i.desc.toLowerCase().includes(q)||i.id.toLowerCase().includes(q));

    document.getElementById('incBody').innerHTML=inc.map(i=>`<tr>
      <td><a href="incident-detail.html?id=${i.id}" style="font-weight:700">${i.id}</a></td>
      <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i.desc}</td>
      <td style="font-size:12px">${i.type}</td>
      <td>${severityDot(i.severity)}<span style="font-size:12px">${i.severity}</span></td>
      <td style="font-size:12px">${i.dept}</td>
      <td style="font-size:12px;color:var(--text-muted)">${timeAgo(i.reported)}</td>
      <td>${statusBadge(i.status)}</td>
      <td><a href="incident-detail.html?id=${i.id}" class="btn btn-secondary btn-sm">View</a></td>
    </tr>`).join('');
  }
  function filterTab(sev,el){tabSev=sev;document.querySelectorAll('.inc-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
  window.filterTab=filterTab;
  render();
}
</script>
</body>
</html>
