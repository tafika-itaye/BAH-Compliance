<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Policy Detail — BAH Compliance</title>
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.detail-grid{display:grid;grid-template-columns:1fr 280px;gap:16px;}
@media(max-width:800px){.detail-grid{grid-template-columns:1fr;}}
.doc-body{background:var(--win-surface);border:1px solid var(--win-border);border-radius:6px;padding:24px;font-size:13px;line-height:1.8;white-space:pre-line;min-height:300px;}
.dept-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.dept-label{font-size:12px;width:100px;flex-shrink:0;color:var(--text-muted);}
.dept-bg{flex:1;height:6px;background:var(--win-surface3);border-radius:3px;overflow:hidden;}
.dept-fill{height:100%;background:var(--accent);border-radius:3px;}
.dept-val{font-size:11px;color:var(--text-muted);width:36px;text-align:right;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--win-border);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--text-muted);font-size:12px;}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent=WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><a href="dashboard.html">Home</a><span>›</span><a href="policies.html">Policies</a><span>›</span><span id="bTitle">—</span></div>
        <div class="page-title" id="topTitle">Policy Detail</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" onclick="history.back()">← Back to policies</button>
      </div>
    </div>
    <div class="content" id="contentArea"><div style="padding:40px;color:var(--text-muted)">Loading…</div></div>
  </div>
</div>
<script>
initData();
const user=requireLogin();
const id=new URLSearchParams(location.search).get('id');
if(user&&id){
  renderSidebar('policies');
  const pol=getPolicies().find(p=>p.id===id);
  if(!pol){ document.getElementById('contentArea').innerHTML='<p style="padding:20px">Policy not found.</p>'; }
  else {
    document.getElementById('bTitle').textContent=pol.title;
    document.getElementById('topTitle').textContent=pol.title;
    document.title=pol.title+' — BAH Compliance';
    const attPct=pol.total>0?Math.round(pol.attested/pol.total*100):0;
    const depts=Object.entries(pol.byDept||{});

    const wfSteps=['Drafted\nQ. Officer','Reviewed\nDept Head','Approved\nCEO','Published\nAll Staff','Attested\nComplete'];
    const wfActive={'Pending Approval':3,'Under Review':2,'Published':4,'Expired':5}[pol.status]||5;

    document.getElementById('contentArea').innerHTML=`
      <div style="margin-bottom:16px">
        <div style="font-size:18px;font-weight:600;margin-bottom:6px">${pol.title} — ${pol.version}</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--text-muted)">${pol.category} · ${pol.cohsasa||'—'}</span>
          ${statusBadge(pol.status)}
          <span style="font-size:12px;color:var(--text-muted)">Mandatory for all clinical staff</span>
        </div>
      </div>

      <!-- Workflow -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Approval Workflow</div>
        <div style="display:flex;gap:0;align-items:flex-start;overflow-x:auto;padding-bottom:4px">
          ${wfSteps.map((s,i)=>{
            const num=i+1;
            const done=num<wfActive;
            const active=num===wfActive;
            const parts=s.split('\n');
            return `<div style="flex:1;text-align:center;position:relative;min-width:80px">
              ${i>0?`<div style="position:absolute;top:14px;right:50%;left:-50%;height:2px;background:${done?'var(--accent)':'var(--win-border2)'}"></div>`:''}
              <div style="width:28px;height:28px;border-radius:50%;border:2px solid ${done?'var(--accent)':active?'var(--accent)':'var(--win-border2)'};background:${done?'var(--accent)':'var(--win-surface)'};color:${done?'#fff':active?'var(--accent)':'var(--text-muted)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin:0 auto 5px;position:relative;z-index:1">${done?'✔':num}</div>
              <div style="font-size:11px;font-weight:600;color:${done?'var(--accent)':active?'var(--text)':'var(--text-muted)'};">${parts[0]}</div>
              <div style="font-size:10px;color:var(--text-dim)">${parts[1]||''}</div>
            </div>`;
          }).join('')}
        </div>
        ${pol.status==='Pending Approval'&&(user.role==='quality'||user.role==='admin')?`
        <div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--win-border)">
          <button class="btn btn-primary btn-sm" onclick="approvePolicy()">Approve &amp; Publish</button>
          <button class="btn btn-secondary btn-sm" onclick="showToast('Revision requested','warning')">Request Revision</button>
        </div>`:''}
      </div>

      <div class="detail-grid">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Policy Document</div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">${pol.version} — ${pol.updated}</div>
          <div class="doc-body">${pol.content}</div>

          <div class="card" style="margin-top:14px">
            <div class="card-title">Version History</div>
            <table class="win-table">
              <thead><tr><th>Version</th><th>Date</th><th>Author</th><th>Changes</th><th>Status</th></tr></thead>
              <tbody>
                <tr><td>${pol.version}</td><td>${pol.updated}</td><td>${pol.owner}</td><td>Latest revision</td><td>${statusBadge(pol.status)}</td></tr>
                <tr><td style="color:var(--text-muted)">Previous</td><td style="color:var(--text-muted)">—</td><td style="color:var(--text-muted)">—</td><td style="color:var(--text-muted)">Prior version</td><td>${statusBadge('Archived')||''}</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div>
          <div class="card" style="margin-bottom:12px">
            <div class="card-title">Attestation Progress</div>
            <div style="font-size:26px;font-weight:300;margin-bottom:2px">${pol.attested} / ${pol.total}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">staff acknowledged</div>
            ${progressBar(attPct, attPct>=80?'var(--success)':attPct>=50?'var(--warning)':'var(--danger)')}
            ${depts.length?`<div style="font-size:12px;margin-top:12px;margin-bottom:6px;color:var(--text-muted)">By department:</div>
            ${depts.map(([dept,val])=>{
              const parts=val.split('/');
              const pct=Math.round(parseInt(parts[0])/parseInt(parts[1])*100)||0;
              return `<div class="dept-bar"><div class="dept-label">${dept}</div><div class="dept-bg"><div class="dept-fill" style="width:${pct}%"></div></div><div class="dept-val">${val}</div></div>`;
            }).join('')}`:''}
          </div>

          <div class="card">
            <div class="card-title">Policy Info</div>
            <div class="info-row"><span class="info-label">Category</span><span>${pol.category}</span></div>
            <div class="info-row"><span class="info-label">Review cycle</span><span>${pol.cycle||'Annual'}</span></div>
            <div class="info-row"><span class="info-label">Next review</span><span>${pol.reviewDue}</span></div>
            <div class="info-row"><span class="info-label">Owner</span><span>${pol.owner}</span></div>
            <div class="info-row"><span class="info-label">COHSASA ref</span><span>${pol.cohsasa||'—'}</span></div>
          </div>
        </div>
      </div>`;

    function approvePolicy(){
      const pols=getPolicies();
      const idx=pols.findIndex(p=>p.id===id);
      if(idx!==-1){pols[idx].status='Published';savePolicies(pols);}
      showToast('Policy approved and published');
      setTimeout(()=>location.reload(),1200);
    }
    window.approvePolicy=approvePolicy;
  }
}
</script>
</body>
</html>
