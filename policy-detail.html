<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Policy Detail — BAH Compliance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.dg{display:grid;grid-template-columns:1fr 270px;gap:16px;}
@media(max-width:800px){.dg{grid-template-columns:1fr;}}
.doc-body{background:var(--win-surface2);border:1px solid var(--win-border);border-radius:6px;padding:18px;font-size:13px;line-height:1.8;white-space:pre-line;min-height:200px;}
.ir{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--win-border);font-size:12px;}
.ir:last-child{border-bottom:none;}
.ir-label{color:var(--text-muted);}
.db-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.db-label{font-size:12px;color:var(--text-muted);width:110px;flex-shrink:0;}
.db-bg{flex:1;height:6px;background:var(--win-surface3);border-radius:3px;overflow:hidden;}
.db-fill{height:100%;background:var(--accent);border-radius:3px;}
.db-val{font-size:11px;color:var(--text-muted);width:36px;text-align:right;}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent = WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><a href="dashboard.html">Home</a><span>›</span><a href="policies.html">Policies</a><span>›</span><span id="bTitle">—</span></div>
        <div class="page-title" id="topTitle">Policy Detail</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" onclick="history.back()">← Back</button>
      </div>
    </div>
    <div class="content" id="contentArea"><div style="padding:30px;color:var(--text-muted)">Loading…</div></div>
  </div>
</div>
<script>
initData();
var user = requireLogin();
var id   = new URLSearchParams(location.search).get('id');
if (user && id) {
  renderSidebar('policies');
  var pol = getPolicies().find(function(p){ return p.id === id; });
  if (!pol) { document.getElementById('contentArea').innerHTML = '<p style="padding:20px">Policy not found.</p>'; }
  else {
    document.getElementById('bTitle').textContent  = pol.title;
    document.getElementById('topTitle').textContent = pol.title;
    document.title = pol.title + ' — BAH Compliance';

    var attPct   = pol.total > 0 ? Math.round(pol.attested/pol.total*100) : 0;
    var attColor = attPct>=80?'var(--success)':attPct>=50?'var(--warning)':'var(--danger)';
    var depts    = Object.entries(pol.byDept || {});

    var wfActive = { 'Pending Approval':3, 'Under Review':2, 'Published':5, 'Expired':5 }[pol.status] || 5;
    var wfLabels = ['Drafted\nQ. Officer','Reviewed\nDept Head','Approved\nCEO','Published\nAll Staff','Attested\nComplete'];
    var wfHtml   = '<div style="display:flex;gap:0;align-items:flex-start;overflow-x:auto;padding-bottom:4px">';
    wfLabels.forEach(function(s, i) {
      var num    = i + 1;
      var done   = num < wfActive;
      var active = num === wfActive;
      var parts  = s.split('\n');
      var lineColor  = done ? 'var(--accent)' : 'var(--win-border2)';
      var circBg     = done ? 'var(--accent)' : 'var(--win-surface)';
      var circColor  = done ? '#fff' : active ? 'var(--accent)' : 'var(--text-muted)';
      var circBorder = done||active ? 'var(--accent)' : 'var(--win-border2)';
      var lblColor   = done ? 'var(--accent)' : active ? 'var(--text)' : 'var(--text-muted)';
      wfHtml += '<div style="flex:1;text-align:center;position:relative;min-width:80px">';
      if (i > 0) wfHtml += '<div style="position:absolute;top:13px;right:50%;left:-50%;height:2px;background:'+lineColor+'"></div>';
      wfHtml += '<div style="width:26px;height:26px;border-radius:50%;border:2px solid '+circBorder+';background:'+circBg+';color:'+circColor+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin:0 auto 4px;position:relative;z-index:1">'+(done?'✔':num)+'</div>';
      wfHtml += '<div style="font-size:11px;font-weight:600;color:'+lblColor+'">'+parts[0]+'</div>';
      wfHtml += '<div style="font-size:10px;color:var(--text-dim)">'+parts[1]+'</div>';
      wfHtml += '</div>';
    });
    wfHtml += '</div>';

    var canApprove = (user.role==='quality'||user.role==='admin') && pol.status==='Pending Approval';
    var approveBtn = canApprove ? '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--win-border);display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="doApprove()">Approve &amp; Publish</button><button class="btn btn-secondary btn-sm" onclick="showToast(\'Revision requested\',\'warning\')">Request Revision</button></div>' : '';

    var deptHtml = '';
    if (depts.length) {
      deptHtml = '<div style="font-size:12px;color:var(--text-muted);margin:10px 0 6px">By department:</div>';
      depts.forEach(function(entry) {
        var parts = entry[1].split('/');
        var pct   = Math.round(parseInt(parts[0]) / parseInt(parts[1]) * 100) || 0;
        deptHtml += '<div class="db-row"><div class="db-label">'+entry[0]+'</div><div class="db-bg"><div class="db-fill" style="width:'+pct+'%"></div></div><div class="db-val">'+entry[1]+'</div></div>';
      });
    }

    document.getElementById('contentArea').innerHTML =
      '<div style="margin-bottom:16px">'
      + '<div style="font-size:18px;font-weight:600;margin-bottom:6px">'+pol.title+' — '+pol.version+'</div>'
      + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:12px;color:var(--text-muted)">'+pol.category+' · '+(pol.cohsasa||'—')+'</span>'+statusBadge(pol.status)+'</div>'
      + '</div>'
      + '<div class="card" style="margin-bottom:14px"><div class="card-title">Approval Workflow</div>'+wfHtml+approveBtn+'</div>'
      + '<div class="dg">'
      + '<div>'
      + '<div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Policy Document</div>'
      + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">'+pol.version+' — '+pol.updated+'</div>'
      + '<div class="doc-body">'+pol.content+'</div>'
      + '<div class="card" style="margin-top:14px"><div class="card-title">Version History</div>'
      + '<table class="win-table"><thead><tr><th>Version</th><th>Date</th><th>Author</th><th>Status</th></tr></thead>'
      + '<tbody><tr><td>'+pol.version+'</td><td>'+pol.updated+'</td><td>'+pol.owner+'</td><td>'+statusBadge(pol.status)+'</td></tr>'
      + '<tr><td style="color:var(--text-muted)">Previous</td><td style="color:var(--text-muted)">—</td><td style="color:var(--text-muted)">—</td><td>'+statusBadge('Archived')+'</td></tr>'
      + '</tbody></table></div>'
      + '</div>'
      + '<div>'
      + '<div class="card" style="margin-bottom:12px">'
      + '<div class="card-title">Attestation Progress</div>'
      + '<div style="font-size:26px;font-weight:300;margin-bottom:2px">'+pol.attested+' / '+pol.total+'</div>'
      + '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">staff acknowledged</div>'
      + progressBar(attPct, attColor)
      + deptHtml
      + '</div>'
      + '<div class="card">'
      + '<div class="card-title">Policy Info</div>'
      + '<div class="ir"><span class="ir-label">Category</span><span>'+pol.category+'</span></div>'
      + '<div class="ir"><span class="ir-label">Review cycle</span><span>'+(pol.cycle||'Annual')+'</span></div>'
      + '<div class="ir"><span class="ir-label">Next review</span><span>'+pol.reviewDue+'</span></div>'
      + '<div class="ir"><span class="ir-label">Owner</span><span>'+pol.owner+'</span></div>'
      + '<div class="ir"><span class="ir-label">COHSASA ref</span><span>'+(pol.cohsasa||'—')+'</span></div>'
      + '</div>'
      + '</div>'
      + '</div>';

    function doApprove() {
      var pols = getPolicies();
      var idx  = pols.findIndex(function(p){ return p.id === id; });
      if (idx !== -1) { pols[idx].status = 'Published'; savePolicies(pols); }
      showToast('Policy approved and published');
      setTimeout(function(){ location.reload(); }, 1200);
    }
    window.doApprove = doApprove;
  }
}
</script>
</body>
</html>
