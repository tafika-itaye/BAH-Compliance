<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Corrective Actions — BAH Compliance</title>
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.ca-tabs{display:flex;gap:0;border-bottom:1px solid var(--win-border);margin-bottom:14px;}
.ca-tab{padding:7px 14px;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;}
.ca-tab:hover{color:var(--text);}.ca-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent=WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><a href="dashboard.html">Home</a><span>›</span><span>Corrective Actions</span></div>
        <div class="page-title">Corrective Action Tracker</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="dateLabel"></span>
        <button class="btn btn-primary btn-sm" onclick="openNew()">＋ New Action</button>
      </div>
    </div>
    <div class="content">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">All corrective actions arising from incidents, audits, and reviews</div>
      <div class="stats-grid" id="caStats"></div>

      <div class="ca-tabs">
        <div class="ca-tab active" onclick="filterTab('',this)">All</div>
        <div class="ca-tab" onclick="filterTab('Open',this)">Open</div>
        <div class="ca-tab" onclick="filterTab('In Progress',this)">In Progress</div>
        <div class="ca-tab" onclick="filterTab('Overdue',this)">Overdue</div>
        <div class="ca-tab" onclick="filterTab('Closed',this)">Closed</div>
      </div>

      <div class="win-table-wrap">
        <table class="win-table">
          <thead><tr><th>Ref</th><th>Action</th><th>Source</th><th>Assigned</th><th>Due</th><th>Progress</th><th>Status</th></tr></thead>
          <tbody id="caBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="newModal" style="display:none">
  <div class="win-modal">
    <div class="win-modal-header"><div class="win-modal-title">New Corrective Action</div><button class="win-modal-close" onclick="document.getElementById('newModal').style.display='none'">✕</button></div>
    <div class="win-modal-body">
      <div class="form-group"><label class="form-label">Action Description</label><textarea class="form-control" id="nDesc" rows="3" placeholder="Describe the corrective action required…"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Source (Incident / Audit)</label><input type="text" class="form-control" id="nSource" placeholder="e.g. INC-0041"></div>
        <div class="form-group"><label class="form-label">Assigned To</label><input type="text" class="form-control" id="nAssigned" placeholder="Name or department"></div>
      </div>
      <div class="form-group"><label class="form-label">Due Date</label><input type="date" class="form-control" id="nDue"></div>
    </div>
    <div class="win-modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('newModal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="createAction()">Create Action</button>
    </div>
  </div>
</div>
<script>
initData();
const user=requireLogin();
let tabStatus='';
if(user){
  renderSidebar('actions');
  document.getElementById('dateLabel').textContent=topbarDate();
  function render(){
    let actions=getActions();
    const total=actions.filter(a=>a.status!=='Closed').length;
    const overdue=actions.filter(a=>a.status==='Overdue').length;
    const closed=actions.filter(a=>a.status==='Closed').length;
    const closureRate=Math.round(closed/(actions.length||1)*100);
    const avgDays=14;
    document.getElementById('caStats').innerHTML=[
      {icon:'📋',label:'Total Active',     value:total,          sub:'Across all sources',     cls:''},
      {icon:'⚠', label:'Overdue',          value:overdue,        sub:'Action required',         cls:overdue>0?'stat-bad':'stat-ok'},
      {icon:'✔', label:'Closure Rate',     value:closureRate+'%',sub:'Target: ≥ 80%',           cls:closureRate>=80?'stat-ok':'stat-warn'},
      {icon:'📅',label:'Avg Days to Close', value:avgDays,        sub:'Target: ≤ 21 days',      cls:'stat-ok'},
    ].map(s=>`<div class="stat-card"><div style="font-size:20px;margin-bottom:4px">${s.icon}</div><div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`).join('');

    if(tabStatus) actions=actions.filter(a=>a.status===tabStatus);
    document.getElementById('caBody').innerHTML=actions.map(a=>`<tr>
      <td style="font-weight:700;color:var(--accent)">${a.id}</td>
      <td style="max-width:240px">${a.action}</td>
      <td><a href="incident-detail.html?id=${a.source}" style="font-size:12px">${a.source}</a></td>
      <td style="font-size:12px">${a.assigned}</td>
      <td style="font-size:12px;color:${a.status==='Overdue'?'var(--danger)':'var(--text-muted)'">${a.due}${a.status==='Overdue'?' ⚠':''}</td>
      <td style="min-width:100px">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1">${progressBar(a.progress,a.status==='Overdue'?'var(--danger)':a.progress===100?'var(--success)':'var(--accent)')}</div>
          <span style="font-size:11px;color:var(--text-muted);width:28px">${a.progress}%</span>
        </div>
      </td>
      <td>${statusBadge(a.status)}</td>
    </tr>`).join('');
  }
  function filterTab(s,el){tabStatus=s;document.querySelectorAll('.ca-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
  function openNew(){const d=new Date();d.setDate(d.getDate()+14);document.getElementById('nDue').value=d.toISOString().slice(0,10);document.getElementById('newModal').style.display='flex';}
  function createAction(){
    const desc=document.getElementById('nDesc').value.trim();
    if(!desc){alert('Description required.');return;}
    const actions=getActions();
    const id='CA-0'+(actions.length+13);
    actions.unshift({id,action:desc,source:document.getElementById('nSource').value||'—',assigned:document.getElementById('nAssigned').value||'Unassigned',due:document.getElementById('nDue').value||'—',progress:0,status:'Open'});
    saveActions(actions);
    document.getElementById('newModal').style.display='none';
    showToast('Corrective action created');render();
  }
  window.filterTab=filterTab;window.openNew=openNew;window.createAction=createAction;
  render();
}
</script>
</body>
</html>
