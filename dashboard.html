<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — BAH Compliance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.coh-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.coh-label{font-size:12px;color:var(--text-muted);width:140px;flex-shrink:0;}
.coh-bg{flex:1;height:8px;background:var(--win-surface3);border-radius:3px;overflow:hidden;}
.coh-fill{height:100%;border-radius:3px;}
.coh-val{font-size:12px;font-weight:600;width:36px;text-align:right;}
.att-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--win-border);}
.att-item:last-child{border-bottom:none;}
.att-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.att-sub{font-size:11px;color:var(--text-muted);}
.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent = WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><span>Home</span><span>›</span><span>Overview</span></div>
        <div class="page-title">Dashboard</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="dateLabel"></span>
        <button class="btn btn-primary btn-sm" onclick="location.href='report-incident.html'">⚠ Report Incident</button>
        <button class="btn btn-secondary btn-sm" onclick="location.href='kpi.html'">📊 View KPIs</button>
      </div>
    </div>
    <div class="content">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Compliance Overview — <strong style="color:var(--text)">BAH Quality &amp; Safety Platform</strong></div>
      <div class="stats-grid" id="statCards"><div class="loading">Loading...</div></div>
      <div class="three-col" style="margin-bottom:14px;">
        <div>
          <div class="card" style="margin-bottom:14px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div class="card-title" style="margin:0">Pending Staff Attestations</div>
              <a href="attestations.html" style="font-size:12px">View all →</a>
            </div>
            <div id="attestList"><div class="loading">Loading...</div></div>
          </div>
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <div class="card-title" style="margin:0">COHSASA Readiness</div>
              <span class="win-badge win-badge-green">On Track</span>
            </div>
            <div style="font-size:24px;font-weight:300;margin-bottom:2px;color:var(--accent)">90%</div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">5-Star Target · Next audit: June 2026</div>
            <div id="cohsasaBar"></div>
          </div>
        </div>
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div class="card-title" style="margin:0">Recent Incidents &amp; Near Misses</div>
            <a href="report-incident.html" style="font-size:12px">Report new →</a>
          </div>
          <div id="recentInc"><div class="loading">Loading...</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
initPage('dashboard').then(function(user) {
  document.getElementById('ws').textContent = WIN_CSS;
  renderSidebar('dashboard');
  document.getElementById('dateLabel').textContent = topbarDate();

  var incidents = getIncidents();
  var policies  = getPolicies();
  var actions   = getActions();
  var sops      = getSOPs();

  var open     = incidents.filter(function(i){ return i.status === 'Open' || i.status === 'Investigating'; }).length;
  var sopOk    = sops.filter(function(s){ return s.status === 'Current'; }).length;
  var overdue  = actions.filter(function(a){ return a.status === 'Overdue'; }).length;
  var activeAc = actions.filter(function(a){ return a.status !== 'Closed'; }).length;

  document.getElementById('statCards').innerHTML = [
    { icon:'📋', label:'Policy Compliance',  value:'94%',                 sub:'Staff attestation rate',  cls:'stat-warn' },
    { icon:'⚠',  label:'Open Incidents',     value:open,                  sub:'Under investigation',     cls:open > 0 ? 'stat-bad' : '' },
    { icon:'🔒', label:'SOPs Current',       value:sopOk+'/'+sops.length, sub:'Check review dates',      cls:'stat-warn' },
    { icon:'✔',  label:'Corrective Actions', value:activeAc,              sub:overdue+' overdue',        cls:overdue > 0 ? 'stat-bad' : 'stat-ok' },
  ].map(function(s){
    return '<div class="stat-card"><div style="font-size:20px;margin-bottom:4px">'+s.icon+'</div><div class="stat-label">'+s.label+'</div><div class="stat-value '+s.cls+'">'+s.value+'</div><div class="stat-sub">'+s.sub+'</div></div>';
  }).join('');

  // Attestation list from live policies
  var activePolicies = policies.filter(function(p){ return p.status === 'Active'; }).slice(0, 3);
  if (activePolicies.length === 0) {
    document.getElementById('attestList').innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:10px 0">No active policies requiring attestation.</div>';
  } else {
    document.getElementById('attestList').innerHTML = activePolicies.map(function(p){
      var pct = p.attestCount && p.attestTarget ? Math.round(p.attestCount / p.attestTarget * 100) : 0;
      var done = pct >= 100;
      if (done) return '<div class="att-item"><div><div class="att-title">✔ '+p.title+'</div><div class="att-sub">v'+p.version+' · '+p.department+' · Complete</div></div><span style="font-size:12px;color:var(--success);font-weight:600">Complete</span></div>';
      return '<div class="att-item"><div><div class="att-title">⏳ '+p.title+'</div><div class="att-sub">v'+p.version+' · '+p.department+' · '+(p.attestCount||0)+' of '+(p.attestTarget||'?')+' acknowledged</div></div><div style="text-align:right;flex-shrink:0"><a href="attestations.html" style="font-size:11px">Acknowledge →</a></div></div>';
    }).join('');
  }

  var bars = [
    { label:'Policy Attestation', pct:94,  color:'#0067c0' },
    { label:'Incident Reporting', pct:100, color:'#107c10' },
    { label:'SOP Currency',       pct:76,  color:'#c75700' },
  ];
  document.getElementById('cohsasaBar').innerHTML = bars.map(function(b){
    return '<div class="coh-row"><div class="coh-label">'+b.label+'</div><div class="coh-bg"><div class="coh-fill" style="width:'+b.pct+'%;background:'+b.color+'"></div></div><div class="coh-val">'+b.pct+'%</div></div>';
  }).join('');

  var incHtml = '<table class="win-table" style="font-size:12px"><thead><tr><th>Ref</th><th>Description</th><th>Type</th><th>Severity</th><th>Dept</th><th>Reported</th><th>Status</th></tr></thead><tbody>';
  if (incidents.length === 0) {
    incHtml += '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:20px">No incidents recorded.</td></tr>';
  } else {
    incidents.slice(0, 4).forEach(function(i){
      incHtml += '<tr onclick="location.href=\'incident-detail.html?id='+i.id+'\'" style="cursor:pointer"><td style="color:var(--accent);font-weight:600">'+i.incidentNumber+'</td><td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+i.title+'</td><td>'+i.type+'</td><td>'+severityDot(i.severity)+i.severity+'</td><td>'+i.department+'</td><td>'+timeAgo(i.createdAt)+'</td><td>'+statusBadge(i.status)+'</td></tr>';
    });
  }
  incHtml += '</tbody></table>';
  document.getElementById('recentInc').innerHTML = incHtml;

}).catch(function() {
  window.location.href = 'index.html';
});
</script>
</body>
</html>
