<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — BAH Compliance</title>
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.cohsasa-bar{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.coh-row{display:flex;align-items:center;gap:10px;}
.coh-label{font-size:12px;color:var(--text-muted);width:160px;flex-shrink:0;}
.coh-bg{flex:1;height:8px;background:var(--win-surface3);border-radius:3px;overflow:hidden;}
.coh-fill{height:100%;border-radius:3px;}
.coh-val{font-size:12px;font-weight:600;width:36px;text-align:right;}
.attest-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--win-border);}
.attest-item:last-child{border-bottom:none;}
.attest-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.attest-sub{font-size:11px;color:var(--text-muted);}
.attest-due{font-size:11px;font-weight:600;}
.attest-due.urgent{color:var(--danger);}
.attest-due.pending{color:var(--warning);}
.attest-done{color:var(--success);font-size:12px;}
.inc-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--win-border);font-size:12px;}
.inc-row:last-child{border-bottom:none;}
.inc-ref{font-weight:700;color:var(--accent);width:65px;flex-shrink:0;}
.inc-desc{flex:1;color:var(--text);}
.inc-meta{color:var(--text-muted);white-space:nowrap;}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent=WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><span>Home</span><span>›</span><span>Overview</span></div>
        <div class="page-title">Dashboard</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="dateLabel"></span>
        <span style="font-size:18px;cursor:pointer;color:var(--text-muted)" title="Notifications">🔔</span>
        <button class="btn btn-primary btn-sm" onclick="location.href='report-incident.html'">⚠ Report Incident</button>
        <button class="btn btn-secondary btn-sm" onclick="location.href='kpi.html'">📊 View KPIs</button>
      </div>
    </div>
    <div class="content">

      <!-- Headline -->
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Compliance Overview — <strong style="color:var(--text)">BAH Quality &amp; Safety Platform</strong> — March 2026</div>

      <!-- Stat cards -->
      <div class="stats-grid" id="statCards"></div>

      <div class="three-col" style="margin-bottom:14px;">
        <!-- Attestations -->
        <div>
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <div class="card-title" style="margin:0">Pending Staff Attestations</div>
              <a href="attestations.html" style="font-size:12px">View all policies →</a>
            </div>
            <div id="attestList"></div>
          </div>

          <!-- COHSASA readiness -->
          <div class="card" style="margin-top:14px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
              <div class="card-title" style="margin:0">COHSASA Readiness</div>
              <span class="win-badge win-badge-green" style="font-size:11px">On Track</span>
            </div>
            <div style="font-size:22px;font-weight:300;margin-bottom:2px;">90%</div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">5-Star Target · Next audit: June 2026</div>
            <div class="cohsasa-bar" id="cohsasaBar"></div>
          </div>
        </div>

        <!-- Right column -->
        <div>
          <!-- Recent incidents -->
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <div class="card-title" style="margin:0">Recent Incidents &amp; Near Misses</div>
              <a href="report-incident.html" style="font-size:12px">Report new →</a>
            </div>
            <div id="recentInc"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
initData();
const user=requireLogin();
if(user){
  document.getElementById('ws').textContent=WIN_CSS;
  renderSidebar('dashboard');
  document.getElementById('dateLabel').textContent=topbarDate();

  const incidents=getIncidents();
  const policies=getPolicies();
  const actions=getActions();
  const pending=getPending();

  const open=incidents.filter(i=>i.status==='Investigating'||i.status==='Action Plan').length;
  const sops=getSOPs();
  const sopOk=sops.filter(s=>s.status==='Current').length;
  const overdue=actions.filter(a=>a.status==='Overdue').length;

  document.getElementById('statCards').innerHTML=[
    {icon:'📋',label:'Policy Compliance', value:'94%',  sub:'Staff attestation rate',    cls:'stat-warn'},
    {icon:'⚠', label:'Open Incidents',    value:open,   sub:'2 under investigation',     cls:'stat-bad'},
    {icon:'🔒',label:'SOPs Current',      value:`${sopOk}/${sops.length}`,sub:'3 due for review', cls:'stat-warn'},
    {icon:'✔', label:'Corrective Actions',value:actions.filter(a=>a.status!=='Closed').length, sub:`${overdue} overdue`, cls:overdue>0?'stat-bad':'stat-ok'},
  ].map(s=>`<div class="stat-card"><div style="font-size:20px;margin-bottom:4px">${s.icon}</div><div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`).join('');

  // Attestations
  const attItems=[
    {title:'Infection Control Policy — v4.2',    sub:'Updated 3 days ago · Mandatory for all clinical staff · 34 of 112 acknowledged', due:'Due: 20 Mar',  cls:'urgent',  done:false},
    {title:'Medication Administration SOP — v2.1',sub:'Updated 5 days ago · Nursing staff · 18 of 42 acknowledged',                   due:'Due: 24 Mar',  cls:'pending', done:false},
    {title:'Patient Privacy Policy — v3.0',       sub:'Updated 2 weeks ago · All staff · 178 of 180 acknowledged',                    due:'Complete',     cls:'',        done:true},
  ];
  document.getElementById('attestList').innerHTML=attItems.map(a=>`
    <div class="attest-item">
      <div>
        <div class="attest-title">${a.done?'✔ ':''}${a.title}</div>
        <div class="attest-sub">${a.sub}</div>
      </div>
      ${a.done
        ? `<span class="attest-done">Complete</span>`
        : `<div style="text-align:right"><div class="attest-due ${a.cls}">${a.due}</div><a href="attestations.html" style="font-size:11px">Acknowledge →</a></div>`}
    </div>`).join('');

  // COHSASA
  const bars=[
    {label:'Policy Attestation', pct:94, color:'#0067c0'},
    {label:'Incident Reporting', pct:100,color:'#107c10'},
    {label:'SOP Currency',       pct:76, color:'#c75700'},
  ];
  document.getElementById('cohsasaBar').innerHTML=bars.map(b=>`
    <div class="coh-row">
      <div class="coh-label">${b.label}</div>
      <div class="coh-bg"><div class="coh-fill" style="width:${b.pct}%;background:${b.color}"></div></div>
      <div class="coh-val">${b.pct}%</div>
    </div>`).join('');

  // Recent incidents
  document.getElementById('recentInc').innerHTML=`
    <table class="win-table" style="font-size:12px">
      <thead><tr><th>Ref</th><th>Description</th><th>Type</th><th>Severity</th><th>Dept</th><th>Reported</th><th>Status</th></tr></thead>
      <tbody>${incidents.slice(0,4).map(i=>`<tr>
        <td><a href="incident-detail.html?id=${i.id}">${i.id}</a></td>
        <td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i.desc}</td>
        <td>${i.type}</td>
        <td>${severityDot(i.severity)}${i.severity}</td>
        <td>${i.dept}</td>
        <td>${timeAgo(i.reported)}</td>
        <td>${statusBadge(i.status)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}
</script>
</body>
</html>
