<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incident Detail — BAH Compliance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script><script src="ui.js"></script>
<style id="ws"></style>
<style>
.dg{display:grid;grid-template-columns:1fr 250px;gap:16px;}
@media(max-width:800px){.dg{grid-template-columns:1fr;}}
.det-box{background:var(--win-surface2);border:1px solid var(--win-border);border-radius:6px;padding:12px 14px;font-size:13px;line-height:1.7;margin-bottom:10px;}
.ir{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--win-border);font-size:12px;}
.ir:last-child{border-bottom:none;}
.ir-label{color:var(--text-muted);}
.wfv{display:flex;flex-direction:column;gap:0;}
.wfv-item{display:flex;gap:12px;position:relative;}
.wfv-item::before{content:'';position:absolute;left:11px;top:28px;bottom:-10px;width:2px;background:var(--win-border2);}
.wfv-item:last-child::before{display:none;}
.wfv-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--win-border2);background:var(--win-surface);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;z-index:1;}
.wfv-item.done .wfv-circle{background:var(--accent);border-color:var(--accent);color:#fff;}
.wfv-item.done::before{background:var(--accent);}
.wfv-item.active .wfv-circle{border-color:var(--accent);color:var(--accent);}
.wfv-body{padding-bottom:14px;}
.wfv-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.wfv-sub{font-size:11px;color:var(--text-muted);}
</style>
</head>
<body>
<script>document.getElementById('ws').textContent = WIN_CSS;</script>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="breadcrumb"><a href="dashboard.html">Home</a><span>›</span><a href="incidents.html">Incidents</a><span>›</span><span id="bId">—</span></div>
        <div class="page-title" id="topTitle">Incident Investigation</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" onclick="location.href='incidents.html'">← All incidents</button>
      </div>
    </div>
    <div class="content" id="contentArea"><div style="padding:30px;color:var(--text-muted)">Loading…</div></div>
  </div>
</div>
<script>
initData();
var user = requireLogin();
var id   = new URLSearchParams(location.search).get('id');
if (user && id) {
  renderSidebar('incidents');
  var inc = getIncidents().find(function(i){ return i.id === id; });
  if (!inc) { document.getElementById('contentArea').innerHTML = '<p style="padding:20px">Incident not found.</p>'; }
  else {
    document.getElementById('bId').textContent    = inc.id;
    document.getElementById('topTitle').textContent = inc.id + ' — Investigation';
    document.title = inc.id + ' — BAH Compliance';

    var canManage = user.role === 'quality' || user.role === 'admin';

    var wfSteps = [
      { title:'Report Received',       sub:'Received via compliance system',                                  time:inc.reported+' · 07:12 AM', done:true },
      { title:'Initial Review',        sub:'Quality Officer reviewed and classified',                         time:inc.reported+' · 08:30 AM', done:inc.step>=2 },
      { title:'Root Cause Analysis',   sub:'Investigating contributing factors',                              time:inc.step===3?'⏳ In progress':'', done:inc.step>3, active:inc.step===3 },
      { title:'Corrective Action Plan',sub:'Define and assign corrective actions',                            time:'', done:inc.step>4, active:inc.step===4 },
      { title:'Close Investigation',   sub:'Verify actions complete, close and archive',                      time:'', done:inc.step>=5 },
    ];

    var wfHtml = '<div class="wfv">';
    wfSteps.forEach(function(s, i) {
      var cls = (s.done ? ' done' : '') + (s.active ? ' active' : '');
      wfHtml += '<div class="wfv-item'+cls+'">'
        + '<div class="wfv-circle">'+(s.done?'✔':(i+1))+'</div>'
        + '<div class="wfv-body">'
        + '<div class="wfv-title" style="color:'+(s.done?'var(--accent)':s.active?'var(--text)':'var(--text-muted)')+'">'+(i+1)+'. '+s.title+'</div>'
        + '<div class="wfv-sub">'+s.sub+'</div>'
        + (s.time ? '<div class="wfv-sub" style="margin-top:2px">'+s.time+'</div>' : '')
        + '</div></div>';
    });
    wfHtml += '</div>';

    var advBtn = '';
    if (canManage && inc.status !== 'Closed') {
      advBtn = '<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--win-border)">'
        + '<button class="btn btn-primary btn-sm" onclick="advance()">Advance Investigation →</button>'
        + '<button class="btn btn-secondary btn-sm" onclick="closeInc()">Close Investigation</button>'
        + '</div>';
    }

    document.getElementById('contentArea').innerHTML =
      '<div style="margin-bottom:14px">'
      + '<div style="font-size:17px;font-weight:600;margin-bottom:5px">'+inc.id+' — '+inc.desc+'</div>'
      + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)">'+inc.dept+' · '+inc.type+' · Reported '+timeAgo(inc.reported)+' '+statusBadge(inc.status)+'</div>'
      + '</div>'
      + '<div class="card" style="margin-bottom:14px"><div class="card-title">Investigation Workflow</div>'+wfHtml+advBtn+'</div>'
      + '<div class="dg">'
      + '<div>'
      + '<div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">What Happened</div>'
      + '<div class="det-box">'+inc.what+'</div>'
      + '<div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Contributing Factors</div>'
      + '<div class="det-box">'+(inc.factors||'—')+'</div>'
      + '<div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Immediate Action Taken</div>'
      + '<div class="det-box">'+(inc.action||'—')+'</div>'
      + '<div class="card" style="margin-top:12px"><div class="card-title">Related Policies</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--win-border)"><div><div style="font-size:13px;font-weight:500">Medication Administration SOP</div><div style="font-size:11px;color:var(--text-muted)">v2.1 · Published</div></div><a href="policy-detail.html?id=POL-003" class="btn btn-secondary btn-sm">View</a></div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0"><div><div style="font-size:13px;font-weight:500">Infection Control Policy</div><div style="font-size:11px;color:var(--text-muted)">v4.2 · Pending Approval</div></div><a href="policy-detail.html?id=POL-001" class="btn btn-secondary btn-sm">View</a></div>'
      + '</div>'
      + '</div>'
      + '<div>'
      + '<div class="card">'
      + '<div class="card-title">Incident Info</div>'
      + '<div class="ir"><span class="ir-label">Reference</span><span style="font-weight:700;color:var(--accent)">'+inc.id+'</span></div>'
      + '<div class="ir"><span class="ir-label">Type</span><span>'+inc.type+'</span></div>'
      + '<div class="ir"><span class="ir-label">Severity</span><span>'+severityDot(inc.severity)+inc.severity+'</span></div>'
      + '<div class="ir"><span class="ir-label">Department</span><span>'+inc.dept+'</span></div>'
      + '<div class="ir"><span class="ir-label">Reporter</span><span>'+inc.reporter+'</span></div>'
      + '<div class="ir"><span class="ir-label">Investigator</span><span>'+inc.investigator+'</span></div>'
      + '<div class="ir"><span class="ir-label">Status</span>'+statusBadge(inc.status)+'</div>'
      + '</div>'
      + (canManage ? '<div style="margin-top:10px"><a href="corrective-actions.html" class="btn btn-secondary" style="width:100%;justify-content:center">🔧 Corrective Actions</a></div>' : '')
      + '</div>'
      + '</div>';

    function advance() {
      var incs = getIncidents();
      var idx  = incs.findIndex(function(i){ return i.id === id; });
      if (idx !== -1 && incs[idx].step < 5) { incs[idx].step++; if(incs[idx].step>=5) incs[idx].status='Closed'; saveIncidents(incs); }
      showToast('Investigation advanced to next step');
      setTimeout(function(){ location.reload(); }, 1200);
    }
    function closeInc() {
      var incs = getIncidents();
      var idx  = incs.findIndex(function(i){ return i.id === id; });
      if (idx !== -1) { incs[idx].status='Closed'; incs[idx].step=5; saveIncidents(incs); }
      showToast('Investigation closed');
      setTimeout(function(){ location.href='incidents.html'; }, 1200);
    }
    window.advance  = advance;
    window.closeInc = closeInc;
  }
}
</script>
</body>
</html>
